<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orca Phone v25.0 Elite (iPhone 15 Pro Max)</title>
    <!-- Master CSS Repair -->
    <link rel="stylesheet" href="style.css?v=25">
    <!-- JS Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    
    <!-- MASTER WRAPPER (Invisible Root) -->
    <div id="phone-wrapper" class="opacity-0 pointer-events-none">
        
        <!-- PHYSICAL CHASSIS (MASKING PROTECTED) -->
        <div id="phone-container">
            
            <!-- Side Buttons - Titanium Metallics (Image 9 Fix) -->
            <div class="btn-action"></div>
            <div class="btn-vol-up"></div>
            <div class="btn-vol-down"></div>
            <div class="btn-power"></div>

            <!-- MAIN TITANIUM CHASSIS -->
            <div class="iphone-master-chassis">
                
                <!-- OLED DISPLAY PANEL -->
                <div class="display-layer">
                    
                    <!-- Mesh Wallpaper & Watermark -->
                    <div id="phone-bg">
                        <div class="watermark-logo">
                            <span style="font-weight:300">ORCA</span><br>RP
                        </div>
                    </div>

                    <!-- DYNAMIC ISLAND (iOS Pillar) -->
                    <div id="dynamic-island" class="dynamic-island"></div>
 
                    <!-- INTERACTIVE UI HUB -->
                    <div class="main-screen h-full w-full relative flex flex-col z-10">
                        
                        <!-- Status Bar Group (Elite v26.0 Platinum) -->
                        <div class="status-bar">
                            <div id="clock-native">14:56</div>
                            <div class="status-right">
                                <!-- Signal (SVG) -->
                                <svg class="status-svg" viewBox="0 0 100 100" style="height: 1.1vh; width: 1.5vh;"><rect x="0" y="60" width="15" height="40" rx="3" fill="white" /><rect x="25" y="40" width="15" height="60" rx="3" fill="white" /><rect x="50" y="20" width="15" height="80" rx="3" fill="white" /><rect x="75" y="0" width="15" height="100" rx="3" fill="white" /></svg>
                                <!-- Wi-Fi (SVG) -->
                                <svg class="status-svg" viewBox="0 0 24 24" style="height: 1.4vh; width: 1.4vh;"><path d="M12 21l-12-11.654c1.89-1.857 4.259-3.212 6.942-3.886 1.645-.414 3.355-.414 5-.001 2.683.674 5.053 2.029 6.942 3.887l-12 11.654z" fill="white" /></svg>
                                <!-- Battery (SVG iOS Style) -->
                                <svg class="status-svg" viewBox="0 0 24 14" style="height: 1.35vh; width: 2.4vh;"><rect x="0.5" y="0.5" width="20" height="11" rx="2.5" stroke="rgba(255,255,255,0.4)" fill="none" stroke-width="1.2"/><rect x="2.5" y="2.5" width="14" height="7" rx="1.2" fill="white"/><path d="M21.5 3.5C22.5 3.5 23.5 4.5 23.5 6V8C23.5 9.5 22.5 10.5 21.5 10.5V3.5Z" fill="rgba(255,255,255,0.4)"/></svg>
                            </div>
                        </div>

                        <!-- 4x2 APP GRID (Top Area - Image 6 Style) -->
                        <div id="app-grid">
                            <div class="app-item" onclick="openApp('orcaBank')">
                                <div class="app-icon"><img src="https://cdn-icons-png.flaticon.com/512/2621/2621063.png" class="app-img bank-bg"></div>
                                <span class="app-name">Banco</span>
                            </div>
                            <div class="app-item" onclick="openApp('garagem')">
                                <div class="app-icon"><img src="https://cdn-icons-png.flaticon.com/512/2830/2830305.png" class="app-img garage-bg"></div>
                                <span class="app-name">Garagem</span>
                            </div>
                            <div class="app-item" onclick="openApp('orcaGram')">
                                <div class="app-icon"><img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" class="app-img"></div>
                                <span class="app-name">Câmera</span>
                            </div>
                            <div class="app-item" onclick="openApp('orcaZap')">
                                <div class="app-icon relative-icon">
                                    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" class="app-img">
                                    <div class="notification-badge">5</div>
                                </div>
                                <span class="app-name">Zap</span>
                            </div>
                            <div class="app-item" onclick="openApp('olx')">
                                <div class="app-icon"><img src="https://cdn-icons-png.flaticon.com/512/1162/1162499.png" class="app-img olx-bg"></div>
                                <span class="app-name">OLX</span>
                            </div>
                            <div class="app-item" onclick="openApp('mercadoNegro')">
                                <div class="app-icon"><img src="https://cdn-icons-png.flaticon.com/512/2921/2921822.png" class="app-img cyber-bg"></div>
                                <span class="app-name">Negro</span>
                            </div>
                            <div class="app-item" onclick="openApp('ajustes')">
                                <div class="app-icon"><img src="https://cdn-icons-png.flaticon.com/512/3132/3132084.png" class="app-img settings-bg"></div>
                                <span class="app-name">Ajustes</span>
                            </div>
                            <div class="app-item" onclick="openApp('contatos')">
                                <div class="app-icon"><img src="https://cdn-icons-png.flaticon.com/512/3095/3095183.png" class="app-img contacts-bg"></div>
                                <span class="app-name">Contatos</span>
                            </div>
                        </div>

                        <!-- FIXED BOTTOM DOCK (Image 5/6 Fix) -->
                        <div id="dock-master">
                            <div class="app-item" onclick="openApp('orcaBank')">
                                <div class="app-icon relative-icon">
                                    <img src="https://cdn-icons-png.flaticon.com/512/2621/2621063.png" class="app-img bank-bg">
                                    <div class="notification-badge shadow-xl">1</div>
                                </div>
                            </div>
                            <div class="app-item" onclick="openApp('orcaZap')">
                                <div class="app-icon relative-icon">
                                    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" class="app-img">
                                    <div class="notification-badge shadow-xl">5</div>
                                </div>
                            </div>
                            <div class="app-item" onclick="openApp('contatos')">
                                <div class="app-icon"><img src="https://cdn-icons-png.flaticon.com/512/3095/3095183.png" class="app-img contacts-bg"></div>
                            </div>
                            <div class="app-item" onclick="openApp('ajustes')">
                                <div class="app-icon"><img src="https://cdn-icons-png.flaticon.com/512/3132/3132084.png" class="app-img settings-bg"></div>
                            </div>
                        </div>

                        <!-- iOS Gesture Home Indicator -->
                        <div id="gesture-bar-home" class="gesture-bar"></div>

                    </div>

                    <!-- APPLICATION CONTEXT LAYER -->
                    <div id="app-layer" class="absolute inset-0 z-[500] no-scrollbar overflow-hidden"></div>

                </div>

            </div>

        </div>

    </div>

    <!-- Core Repair HUB -->
    <script src="script.js?v=25"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
